  <script data-client-boot>
    (function () {
      var supported = ['ko', 'en'];
      function safeGet(key) {
        try {
          return localStorage.getItem(key);
        } catch (err) {
          return null;
        }
      }
      function pickLocale() {
        var stored = safeGet('stateless-tools-locale');
        if (stored && supported.indexOf(stored) !== -1) {
          return stored;
        }
        var lang = (navigator.language || '').slice(0, 2);
        if (supported.indexOf(lang) !== -1) {
          return lang;
        }
        return 'ko';
      }
      function pickTheme() {
        var stored = safeGet('stateless-theme');
        if (stored === 'light' || stored === 'dark') {
          return stored;
        }
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          return 'dark';
        }
        return 'light';
      }
      var doc = document.documentElement;
      var locale = pickLocale();
      doc.setAttribute('lang', locale);
      doc.setAttribute('data-theme', pickTheme());
      doc.setAttribute('data-preferred-locale', locale);
      doc.classList.add('i18n-pending');
      window.__preferredLocale = locale;
    })();
  </script>

<body class="layout layout--dev" data-tool="api-tester" data-allow-ads="false">
  <div class="page page--dev">
    <div class="page-controls">
      <label class="sr-only" for="localeSelect" data-i18n="common.languageLabel">언어</label>
      <div class="locale-switcher">
        <select id="localeSelect" aria-label="Language">
          <option value="ko" data-i18n="common.languageKorean">한국어</option>
          <option value="en" data-i18n="common.languageEnglish">English</option>
        </select>
      </div>
    </div>
    <header class="page-header">
      <a class="back-link" href="/" data-i18n="common.back">← 도구 목록으로</a>
      <h1 data-i18n="api.title">API 테스터</h1>
      <p data-i18n="api.description">HTTP 요청을 보내고 응답을 확인한 뒤 cURL 명령으로 정리합니다.</p>
    </header>
    <main class="tool tool--columns">
      <section class="tool__panel tool__panel--stack">
        <div class="tool-grid-3">
          <div>
            <label for="apiMethod">Method</label>
            <select id="apiMethod">
              <option>GET</option>
              <option>POST</option>
              <option>PUT</option>
              <option>PATCH</option>
              <option>DELETE</option>
            </select>
          </div>
          <div style="grid-column: span 2;">
            <label for="apiUrl">URL</label>
            <input id="apiUrl" type="url" placeholder="https://httpbin.org/get" />
          </div>
        </div>
        <label for="apiHeaders" data-i18n="api.headers">헤더 (Key: Value)</label>
        <textarea id="apiHeaders" rows="4">Content-Type: application/json</textarea>
        <label for="apiBody" data-i18n="api.body">본문</label>
        <textarea id="apiBody" rows="6">{"hello":"world"}</textarea>
        <div class="toolbar">
          <button id="apiSendBtn" class="primary" type="button" data-i18n="api.send">요청 전송</button>
        </div>
        <label for="apiCurl">cURL</label>
        <textarea id="apiCurl" rows="3" readonly></textarea>
      </section>
      <section class="tool__panel tool__panel--stack">
        <label for="apiOutput" data-i18n="api.response">응답</label>
        <textarea id="apiOutput" rows="16" readonly></textarea>
      </section>
    </main>
    <p id="apiMessage" class="message"></p>
  </div>
