<body class="layout layout--dev" data-tool="cron" data-allow-ads="false">

    <div class="page page--dev">
        <div class="page-controls">
            <label class="sr-only" for="localeSelect" data-i18n="common.languageLabel">언어</label>
            <div class="locale-switcher">
                <select id="localeSelect" aria-label="Language">
                    <option value="ko" data-i18n="common.languageKorean">한국어</option>
                    <option value="en" data-i18n="common.languageEnglish">English</option>
                </select>
            </div>
        </div>
        <header class="page-header">
            <a class="back-link" href="/" data-i18n="common.back">← 도구 목록으로</a>
            <h1 data-i18n="cron.title">Cron 계산기</h1>
            <p data-i18n="cron.description">
                복잡한 Cron 스케줄을 알기 쉽게 설명해드리고, 다음 실행 일정을 계산해드립니다.
            </p>
            <div class="page-actions">
                <button type="button" class="ghost" data-share-state data-i18n="common.shareState">상태 공유</button>
            </div>
        </header>

        <main class="tool">
            <section class="tool__panel">
                <label for="cronInput" data-i18n="cron.input">Cron 표현식</label>
                <div class="field-row">
                    <input id="cronInput" type="text" placeholder="* * * * *" value="*/5 * * * *"
                        data-persist="expression" autocomplete="off" />
                </div>
                <div class="cron-explanation" id="cronExplanation">
                    <!-- Explanation will be injected here -->
                </div>

                <div class="option-row">
                    <button type="button" class="ghost" data-preset="* * * * *">매분</button>
                    <button type="button" class="ghost" data-preset="0 * * * *">매시간</button>
                    <button type="button" class="ghost" data-preset="0 0 * * *">매일 자정</button>
                    <button type="button" class="ghost" data-preset="0 9 * * 1">매주 월 09:00</button>
                </div>
            </section>

            <section class="tool__panel tool__panel--stack">
                <h2 data-i18n="cron.nextRuns">다음 실행 시간 (5회)</h2>
                <ul id="nextRunList" class="cron-next-list">
                    <!-- Next runs will be injected here -->
                </ul>
            </section>

        </main>
        <p id="cronMessage" class="message" role="status" aria-live="polite"></p>

        <footer class="footer footer--dev">
            <small data-i18n="common.footerJson">© 2025 stateless tools</small>
        </footer>
    </div>
